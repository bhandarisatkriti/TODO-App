{% extends 'base.html' %}

{% block content%}

<div class="card main-card p-4 bg-white col-md-6 mx-auto">
    <h4 class="fw-bold mb-4 text-center">Add New Task</h4>
    <form action="" method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label fw-semibold">Task Title</label>
            <input type ="text" name="title" class="form-control" placeholder="Enter task title " required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Due Date</label>
            <input type ="date" name="due_date" class="form-control" required>
        </div>

        <div class="d-flax justify-content-between">
            <a href="{% url 'task_list' %}" class="btn btn-outline-secondary btn-custom">
                Back
            </a>

            <button type="submit" class="btn btn-primary btn-custom">Save Task</button>


        </div>

    </form>
</div>

{% endblock %}
