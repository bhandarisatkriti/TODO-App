<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TODO App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <nav class = "navbar bg-primary">
        <div class = "container">
            <a href="" class="navbar-brand fw-bold">TODO App</a>
        </div>

        <div>
          {% if user.is_authenticated %}
          <span class="text-white me-3">Hi, {{user.username}}</span>
          <form action="{% url 'logout' %}" method="POST" style="display: inline;">
            {% csrf_token %}
            <button type="submit" class="btn btn-success btn-sm btn-custom">Logout</button>
          </form>
          {% else %}
            <a href="{% url 'login' %}" class="btn btn-success btn-sm btn-custom">Login</a>
                <a href="{% url 'register' %}" class="btn btn-success btn-sm btn-custom">Register</a>
          {% endif %}
        </div>
    </nav>
        <div class ="container mt-5">
            {% block content%}

            {%endblock %}

        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
